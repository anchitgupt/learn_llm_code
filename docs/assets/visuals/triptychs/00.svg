<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&amp;display=swap');
            text { font-family: 'IBM Plex Mono', monospace; font-size: 16px; fill: #ece8de; }
            .title { font-size: 24px; font-weight: 600; fill: #5ef0c0; }
            .panel-title { font-size: 18px; fill: #9aa1ad; letter-spacing: 2px; text-transform: uppercase; }
            .label { font-size: 14px; fill: #9aa1ad; }
            .code { fill: #f2b65e; font-size: 14px; }
            .box { fill: #181c27; stroke: rgba(255,255,255,0.12); stroke-width: 2; rx: 8; }
            .box-accent { fill: rgba(94, 240, 192, 0.1); stroke: #5ef0c0; stroke-width: 2; rx: 8; }
            .arrow { stroke: #5d6470; stroke-width: 2; fill: none; }
            .arrow-head { fill: #5d6470; }
            .arrow-accent { stroke: #5ef0c0; stroke-width: 2; fill: none; }
            .arrow-head-accent { fill: #5ef0c0; }
            .node { fill: #13161f; stroke: rgba(255,255,255,0.12); stroke-width: 2; rx: 50; }
            .node-active { fill: #2f8f74; stroke: #5ef0c0; stroke-width: 2; rx: 50; }
        </style>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" class="arrow-head"/>
        </marker>
        <marker id="arrow-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" class="arrow-head-accent"/>
        </marker>
    </defs>
    <rect width="100%" height="100%" fill="#13161f" rx="12"/>
    <g transform="translate(40, 40)">
<text x="0" y="10" class="title">00. Neural Network Foundation</text>
    <!-- Panel -->
    <rect x="0" y="40" width="340" height="280" class="box" />
    <text x="20" y="70" class="panel-title">1. THE PROBLEM: XOR</text>
    <line x1="0" y1="90" x2="340" y2="90" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
    
    <circle cx="100" cy="180" r="15" fill="#f08a8a"/>
    <text x="85" y="215" class="label">[0,0]=0</text>
    <circle cx="240" cy="180" r="15" fill="#f08a8a"/>
    <text x="225" y="215" class="label">[1,1]=0</text>
    
    <circle cx="100" cy="250" r="15" fill="#5ef0c0"/>
    <text x="85" y="285" class="label">[0,1]=1</text>
    <circle cx="240" cy="250" r="15" fill="#5ef0c0"/>
    <text x="225" y="285" class="label">[1,0]=1</text>
    <line x1="60" y1="120" x2="280" y2="300" stroke="#5d6470" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="30" y="320" class="label" fill="#f08a8a">Not linearly separable</text>
    
    <!-- Panel -->
    <rect x="390" y="40" width="340" height="280" class="box" />
    <text x="410" y="70" class="panel-title">2. THE ARCHITECTURE</text>
    <line x1="390" y1="90" x2="730" y2="90" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
    
    <!-- Input -->
    <rect x="420" y="140" width="40" height="30" class="node"/>
    <rect x="420" y="220" width="40" height="30" class="node"/>
    
    <!-- Hidden -->
    <rect x="530" y="120" width="40" height="30" class="node-active"/>
    <rect x="530" y="180" width="40" height="30" class="node-active"/>
    <rect x="530" y="240" width="40" height="30" class="node-active"/>
    
    <!-- Output -->
    <rect x="640" y="180" width="40" height="30" class="node-active"/>
    
    <!-- Connections -->
    <line x1="460" y1="155" x2="530" y2="135" class="arrow" marker-end="url(#arrow)"/>
    <line x1="460" y1="155" x2="530" y2="195" class="arrow" marker-end="url(#arrow)"/>
    <line x1="460" y1="155" x2="530" y2="255" class="arrow" marker-end="url(#arrow)"/>
    <line x1="460" y1="235" x2="530" y2="135" class="arrow" marker-end="url(#arrow)"/>
    <line x1="460" y1="235" x2="530" y2="195" class="arrow" marker-end="url(#arrow)"/>
    <line x1="460" y1="235" x2="530" y2="255" class="arrow" marker-end="url(#arrow)"/>
    
    <line x1="570" y1="135" x2="640" y2="195" class="arrow" marker-end="url(#arrow)"/>
    <line x1="570" y1="195" x2="640" y2="195" class="arrow" marker-end="url(#arrow)"/>
    <line x1="570" y1="255" x2="640" y2="195" class="arrow" marker-end="url(#arrow)"/>
    
    <text x="510" y="300" class="label">Hidden Layer solves it</text>
    
    <!-- Panel -->
    <rect x="780" y="40" width="340" height="280" class="box" />
    <text x="800" y="70" class="panel-title">3. BACKPROPAGATION</text>
    <line x1="780" y1="90" x2="1120" y2="90" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
    
    <rect x="820" y="130" width="260" height="150" class="box-accent"/>
    <text x="840" y="160" class="code">1. Forward: Pred = Sigmoid(Wx+b)</text>
    <text x="840" y="200" class="code">2. Loss = (Pred - Target)²</text>
    <text x="840" y="240" class="code">3. Backward: Chain Rule</text>
    <text x="840" y="260" class="code">   ∂L/∂W = (Pred-Target) * ...</text>
    <line x1="1050" y1="190" x2="1050" y2="140" class="arrow-accent" marker-end="url(#arrow-accent)"/>
    <text x="1060" y="170" class="label" fill="#5ef0c0">Gradient Nudge</text>
        </g>
</svg>