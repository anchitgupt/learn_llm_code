<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&amp;display=swap');
            text { font-family: 'IBM Plex Mono', monospace; font-size: 16px; fill: #ece8de; }
            .title { font-size: 24px; font-weight: 600; fill: #5ef0c0; }
            .panel-title { font-size: 18px; fill: #9aa1ad; letter-spacing: 2px; text-transform: uppercase; }
            .label { font-size: 14px; fill: #9aa1ad; }
            .code { fill: #f2b65e; font-size: 14px; }
            .box { fill: #181c27; stroke: rgba(255,255,255,0.12); stroke-width: 2; rx: 8; }
            .box-accent { fill: rgba(94, 240, 192, 0.1); stroke: #5ef0c0; stroke-width: 2; rx: 8; }
            .arrow { stroke: #5d6470; stroke-width: 2; fill: none; }
            .arrow-head { fill: #5d6470; }
            .arrow-accent { stroke: #5ef0c0; stroke-width: 2; fill: none; }
            .arrow-head-accent { fill: #5ef0c0; }
            .node { fill: #13161f; stroke: rgba(255,255,255,0.12); stroke-width: 2; rx: 50; }
            .node-active { fill: #2f8f74; stroke: #5ef0c0; stroke-width: 2; rx: 50; }
        </style>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" class="arrow-head"/>
        </marker>
        <marker id="arrow-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" class="arrow-head-accent"/>
        </marker>
    </defs>
    <rect width="100%" height="100%" fill="#13161f" rx="12"/>
    <g transform="translate(40, 40)">
<text x="0" y="10" class="title">14. Modern GPT Architecture (2026)</text>
    <!-- Panel -->
    <rect x="0" y="40" width="340" height="280" class="box" />
    <text x="20" y="70" class="panel-title">1. RoPE &amp; RMSNorm</text>
    <line x1="0" y1="90" x2="340" y2="90" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
    
    <text x="30" y="140" class="code">RoPE (Rotary Embeddings)</text>
    <text x="30" y="170" class="label">Rotate Q &amp; K vectors.</text>
    <text x="30" y="200" class="label">No learned position tables!</text>
    <text x="30" y="250" class="code">RMSNorm</text>
    <text x="30" y="280" class="label">Normalize by Root Mean Square.</text>
    <text x="30" y="310" class="label">Drops mean/bias = Cheaper.</text>
    
    <!-- Panel -->
    <rect x="390" y="40" width="340" height="280" class="box" />
    <text x="410" y="70" class="panel-title">2. SwiGLU</text>
    <line x1="390" y1="90" x2="730" y2="90" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
    
    <rect x="420" y="130" width="280" height="80" class="box-accent"/>
    <text x="430" y="160" class="code">Gated Feed-Forward:</text>
    <text x="430" y="190" class="code">SiLU(xW1) * xW3</text>
    <text x="420" y="250" class="label">More expressive power per</text>
    <text x="420" y="280" class="label">parameter than standard ReLU.</text>
    
    <!-- Panel -->
    <rect x="780" y="40" width="340" height="280" class="box" />
    <text x="800" y="70" class="panel-title">3. GQA</text>
    <line x1="780" y1="90" x2="1120" y2="90" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>
    
    <text x="800" y="140" class="code">Grouped-Query Attention</text>
    <text x="800" y="180" class="label">Multiple Query heads share</text>
    <text x="800" y="210" class="label">a single Key/Value head.</text>
    <rect x="800" y="240" width="260" height="50" class="box-accent"/>
    <text x="810" y="270" class="code">Lower Loss, Fewer Params!</text>
        </g>
</svg>